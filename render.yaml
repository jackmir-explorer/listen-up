# Render.com 블루프린트 — listen-up 백엔드 원클릭 배포
# 1) 이 레포를 Render 에 연결하고 "New → Blueprint" 선택
# 2) 대시보드에서 ANTHROPIC_API_KEY (sk-ant-...) 입력
# 3) 배포되면 URL(예: https://listen-up-api.onrender.com)을 LISTENUP_API_BASE 로 사용
services:
  - type: web
    name: listen-up-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # 대시보드에서 직접 입력 (레포에 키 저장 금지)
      - key: PORT
        value: 3001
