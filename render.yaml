# Render.com 블루프린트 — listen-up 백엔드 원클릭 배포 (비밀키 불필요!)
# 1) 이 레포를 Render 에 연결하고 "New → Blueprint" 선택 → 그대로 배포
# 2) 배포되면 URL(예: https://listen-up-api.onrender.com)을 복사
# 3) 앱 ⚙ 설정 → "백엔드 서버 주소" 에 그 URL 입력 (Pages·모바일 공통)
#
# Anthropic 키는 앱에서 입력해 요청 헤더로 전달되므로 서버에 키를 둘 필요가 없습니다.
# (원하면 ANTHROPIC_API_KEY 를 envVars 에 sync:false 로 추가해 서버 폴백 키로 쓸 수도 있음)
services:
  - type: web
    name: listen-up-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      # Firebase 로그인 토큰 검증용 (공개 정보 — 비밀 아님)
      - key: FIREBASE_PROJECT_ID
        value: listen-up-99d56
      # (선택) 운영자 공용 키 — 넣으면 키 없는 사용자에게 일일 무료 한도 제공
      # - key: ANTHROPIC_API_KEY   ← Render 대시보드에서 sync:false 로 직접 추가
      # - key: SUPADATA_API_KEY    ← 〃
