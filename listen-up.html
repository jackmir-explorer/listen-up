          </>}

          <div className="sec-t" style={{marginTop:"18px"}}>백엔드 서버 주소 <span className="muted">— 비워두면 기본(Render) 사용</span></div>
          <input className="sync-in" type="text" placeholder={"기본: "+DEFAULT_API_BASE}
            value={api} onChange={e=>{ setApi(e.target.value); setApiSaved(false); }}/>
          <button className="sync-btn primary" onClick={()=>{ onSaveApiUrl(api.trim()); setApiSaved(true); }}>저장</button>
          {apiSaved && <span className="sync-link" style={{cursor:"default"}}>저장됨 ✓ (바로 적용)</span>}

          {!user && <>
          <div className="sec-t" style={{marginTop:"18px"}}>기기 간 동기화 <span className="muted">— GitHub Gist (선택)</span></div>
          {!connected ? <>
            <p className="sync-p">GitHub <b>PAT</b>(classic, <code>gist</code> 권한)을 넣으면 라이브러리가 <b>비공개 Gist</b> 에 백업·동기화됩니다.</p>
            <input className="sync-in" type="password" placeholder="ghp_… 토큰 붙여넣기"
              value={token} onChange={e=>setToken(e.target.value)}/>
            <button className="sync-btn primary" onClick={()=>onConnect(token.trim())}>연결</button>
            <a className="sync-link" href="https://github.com/settings/tokens/new?scopes=gist&description=listen-up"
              target="_blank" rel="noreferrer">토큰 발급하기 →</a>
          </> : <>
            <p className="sync-p">상태: <b>{sync.msg||"연결됨"}</b></p>
            <div className="sync-row">
              <button className="sync-btn" onClick={onPush}>지금 올리기 ↑</button>
              <button className="sync-btn" onClick={onPull}>지금 내려받기 ↓</button>
            </div>
            {GIST_ID && <a className="sync-link" href={"https://gist.github.com/"+GIST_ID}
              target="_blank" rel="noreferrer">Gist 열기 →</a>}
            <button className="sync-btn danger" onClick={onDisconnect}>연결 해제</button>
          </>}
          </>}

          <p className="sync-note">API 키는 이 기기에 저장되고, <b>Google 로그인 중에는 내 계정에도 저장</b>돼 다른 기기에서 로그인하면 자동 적용됩니다. <b>로그아웃하면 이 기기에서 키가 지워져요</b> (공용 기기 보호 — 재로그인 시 자동 복원). Gist 토큰은 이 기기에만 저장됩니다.</p>
        </div>
      </div>
    )}
  </>);
}

function App(){
  const [clips,setClips]=useState(loadClips);
  const [screen,setScreen]=useState("library");
  const [openId,setOpenId]=useState(null);
  const [openSeek,setOpenSeek]=useState(null);
  const [review,setReview]=useState(null);
  const [sync,setSync]=useState({state: gistConnected()?"syncing":"idle", msg:""});
  const [syncOpen,setSyncOpen]=useState(false);
  const [hasKey,setHasKey]=useState(!!getAnthropicKey());
  const saveKey=k=>{ setAnthropicKey(k); setHasKey(!!getAnthropicKey());
    if(userRef.current) cloudPush(clipsRef.current).catch(()=>{}); }; // 로그인 중이면 계정에도 저장
  const clipsRef=useRef(clips); clipsRef.current=clips;
  const syncedOnce=useRef(false);
  const skipPush=useRef(false);
  const pushTimer=useRef(null);

  useEffect(()=>{ saveClips(clips); },[clips]);   // 변경 시마다 로컬 저장

  // 마운트 시 1회: 백엔드 웜업 — Render 무료 플랜은 잠들어 있으므로 미리 깨워 첫 검색 지연 완화
  useEffect(()=>{ const b=apiBase(); if(b){ fetch(b+"/health").catch(()=>{}); } },[]);

  // Google 로그인 상태 (Firebase 설정이 있을 때만 활성)
  const [user,setUser]=useState(null);
  const userRef=useRef(null);
  // 첫 화면 게이트: 로그인 확인이 끝날 때까지 대기, "로그인 없이"는 이 세션 동안 기억
  const [authChecked,setAuthChecked]=useState(!getFirebaseConfig());
  const [guest,setGuest]=useState(()=>{ try{ return sessionStorage.getItem("listen-up.guest")==="1"; }catch(e){ return false; } });
  const enterGuest=()=>{ try{ sessionStorage.setItem("listen-up.guest","1"); }catch(e){} setGuest(true); };
  useEffect(()=>{
    if(!getFirebaseConfig()) return;
    let unsub=null;
    loadFirebase().then(fb=>{
      unsub=fb.auth().onAuthStateChanged(u=>{
        const su=u?{uid:u.uid,name:u.displayName||"",email:u.email||"",photo:u.photoURL||""}:null;
        userRef.current=su; setUser(su); setAuthChecked(true);
        if(su) initialCloudSync();
      });
    }).catch(e=>{ console.error("firebase 초기화 실패:",e); setAuthChecked(true); });
    return ()=>{ if(unsub) unsub(); };
  },[]);
  const applyRemote=r=>{ skipPush.current=true; setClips(dedupeIds(r.clips)); saveClips(r.clips);
    localStorage.setItem(TS_KEY,String(r.updatedAt)); };

  // 기기 전환 대응: 앱 화면으로 돌아올 때 계정에 더 새 데이터가 있으면 자동으로 내려받는다.
  // (다른 기기에서 학습하고 돌아온 경우 — 오래된 상태로 덮어쓰는 사고 방지)
  useEffect(()=>{
    const onVis=async()=>{
      if(document.visibilityState!=="visible" || !userRef.current) return;
      try{
        const fb=await loadFirebase(); const u=fb.auth().currentUser; if(!u) return;
        const doc=await fb.firestore().collection("users").doc(u.uid).get(); // 루트 문서만 가볍게 확인
        const remoteTs=Number((doc.data()||{}).updatedAt)||0;
        if(remoteTs>localTS()){
          const r=await cloudPull();
          if(r){ applyRemote(r); applyCloudExtras(r); setHasKey(!!getAnthropicKey()); setSync({state:"ok",msg:"내려받음"}); }
        }
      }catch(e){ /* 오프라인 등 — 조용히 넘어감 */ }
    };
    document.addEventListener("visibilitychange",onVis);
    return ()=>document.removeEventListener("visibilitychange",onVis);
  },[]);
  const initialCloudSync=async()=>{
    setSync({state:"syncing",msg:"계정 동기화 중…"});
    try{
      const r=await cloudPull();
      if(r && r.updatedAt>localTS()){ applyRemote(r); applyCloudExtras(r); setHasKey(!!getAnthropicKey()); setSync({state:"ok",msg:"내려받음"}); }
      else { await cloudPush(clipsRef.current); setSync({state:"ok",msg:"백업됨"}); }
      syncedOnce.current=true;
    }catch(e){ setSync({state:"error",msg:String(e.message||e)}); }
  };
  const doLogin=async()=>{ try{ await googleSignIn(); }
    catch(e){ setSync({state:"error",msg:String(e.message||e)}); } };
  const doLogout=async()=>{ try{ await googleSignOut(); }catch(e){}
    // 공용 기기 보호: 로그아웃하면 이 기기의 AI 키를 지운다.
    // (키는 계정에 저장돼 있어 다시 로그인하면 자동 복원 — 다음 사용자가 내 키를 못 쓰게)
    setAnthropicKey(""); setSupadataKey(""); setHasKey(false);
    setSync({state:"idle",msg:""}); };

  // 마운트 시 1회: Gist 와 초기 동기화 (원격이 더 새것이면 내려받고, 아니면 백업)
  useEffect(()=>{
    if(!gistConnected()) return;
    (async()=>{
      setSync({state:"syncing",msg:"동기화 중…"});
      try{
        const remote=await gistPull();
        if(remote && remote.updatedAt>localTS()){
          applyRemote(remote);
          setSync({state:"ok",msg:"내려받음"});
        }else{
          await gistPush(clipsRef.current); setSync({state:"ok",msg:"백업됨"});
        }
      }catch(e){ setSync({state:"error",msg:String(e.message||e)}); }
      finally{ syncedOnce.current=true; }
    })();
  },[]);

  // 원격 저장 경로: 로그인 중이면 Google 계정(Firestore), 아니면 Gist
  const remotePush=()=> userRef.current ? cloudPush(clipsRef.current) : gistPush(clipsRef.current);
  const remoteConnected=()=> !!userRef.current || gistConnected();

  // 변경 시 디바운스(2.5s) 푸시 — 초기 동기화 후에만, 방금 내려받은 건 제외
  useEffect(()=>{
    if(!syncedOnce.current) return;
    if(skipPush.current){ skipPush.current=false; return; }
    if(!remoteConnected()) return;
    clearTimeout(pushTimer.current);
    setSync(s=>s.state==="syncing"?s:{state:"dirty",msg:"변경됨"});
    pushTimer.current=setTimeout(async()=>{
      setSync({state:"syncing",msg:"저장 중…"});
      try{ await remotePush(); setSync({state:"ok",msg:"백업됨"}); }
      catch(e){ setSync({state:"error",msg:String(e.message||e)}); }
    },2500);
  },[clips]);

  const pushNow=async()=>{ if(!remoteConnected())return; setSync({state:"syncing",msg:"저장 중…"});
    try{ await remotePush(); setSync({state:"ok",msg:"백업됨"}); }
    catch(e){ setSync({state:"error",msg:String(e.message||e)}); } };
  const pullNow=async()=>{ if(!remoteConnected())return; setSync({state:"syncing",msg:"불러오는 중…"});
    try{ const r=userRef.current?await cloudPull():await gistPull();
      if(r){ applyRemote(r); if(userRef.current){ applyCloudExtras(r); setHasKey(!!getAnthropicKey()); } setSync({state:"ok",msg:"내려받음"}); }
      else setSync({state:"ok",msg:"원격 비어있음"}); }
    catch(e){ setSync({state:"error",msg:String(e.message||e)}); } };
  const connectGist=async(t)=>{ setSyncOpen(false); setGistToken(t);
    if(!t){ setSync({state:"idle",msg:""}); return; }
    setSync({state:"syncing",msg:"연결 중…"});
    try{ const r=await gistPull();
      if(r && r.updatedAt>localTS()){ skipPush.current=true; setClips(dedupeIds(r.clips)); saveClips(r.clips);
        localStorage.setItem(TS_KEY,String(r.updatedAt)); setSync({state:"ok",msg:"내려받음"}); }
      else { await gistPush(clipsRef.current); setSync({state:"ok",msg:"백업됨"}); }
      syncedOnce.current=true;
    }catch(e){ setSync({state:"error",msg:String(e.message||e)}); } };
  const disconnectGist=()=>{ setGistToken(""); setGistId(""); localStorage.removeItem(TS_KEY);
    syncedOnce.current=false; setSync({state:"idle",msg:""}); setSyncOpen(false); };

  const persist=u=>setClips(cs=>cs.map(c=>c.id===u.id?u:c));
  const removeClip=id=>setClips(cs=>cs.filter(c=>c.id!==id));
  // 열람 시각 기록 → 오늘 카드 "이어듣기" 대상 선정
  const stampOpen=id=>setClips(cs=>cs.map(c=>c.id===id?{...c,opened:Date.now()}:c));
  const openClip=id=>{ stampOpen(id); setOpenSeek(null); setOpenId(id); setScreen("study"); };
  const openClipAt=(id,ts)=>{ stampOpen(id); setOpenSeek(ts); setOpenId(id); setScreen("study"); };
  const closeClip=u=>{ persist(u); setOpenId(null); setScreen("library"); };
  const reviewClip=u=>{ persist(u); setReview({cards:u.vocab.map(c=>({...c,videoId:u.id})),label:u.title,back:"study"}); setScreen("review"); };
  // 간격 반복: 평가 결과를 해당 어휘의 SRS(due·streak)에 반영
  const gradeCard=(card,grade)=>{ statBump("review");
    setClips(cs=>cs.map(c=> c.id!==card.videoId ? c
    : {...c, vocab:c.vocab.map(v=> v.id===card.id ? applySrs(v,grade) : v)})); };
  // "복습" = 오늘 due 된 카드만(최대 20, 오래된 순). 없으면 다음 복습 시각 안내.
  const reviewAll=()=>{ const now=Date.now();
    const all=clips.flatMap(c=>c.vocab.map(v=>({...v,videoId:c.id})));
    const due=all.filter(v=>(v.due||0)<=now).sort((a,b)=>(a.due||0)-(b.due||0));
    if(due.length===0){ const next=all.length?Math.min(...all.map(v=>v.due||0)):0;
      setReview({cards:[],label:"복습",back:"library",nextDue:next}); setScreen("review"); return; }
    const picked=due.slice(0,20);
    setReview({cards:picked,label:"오늘의 복습 ("+picked.length+(due.length>20?" / "+due.length:"")+"개)",back:"library"});
    setScreen("review"); };
  const exitReview=()=>{ setScreen(review&&review.back==="study"&&openId?"study":"library"); setReview(null); };

  // 검색 결과 추가: 대본을 비동기로 가져온 뒤 클립 생성 → 학습으로
  const addFromSearch=async r=>{
    const tx=await fetchTranscript(r.id);
    // 길이(total)를 못 받은 경우(oEmbed 폴백 등) 대본 끝 시간으로 추정 → "0:00" 방지
    const total=r.total || (tx.length?Math.round(tx[tx.length-1].end):0);
    // 자막 기반 실측 난이도(말 속도+문장 복잡도)가 제목 추정보다 정확 → 있으면 덮어씀
    const lv=measureLevel(tx);
    const clip={id:r.id,title:r.title,channel:r.channel,level:lv||r.level,lvlMeasured:!!lv,topics:r.topics,
      transcript:tx,total,pos:0,plays:0,vocab:[],marks:[]};
    setClips(cs=>cs.some(c=>c.id===clip.id)?cs:[...cs,clip]);
    setOpenSeek(null); setOpenId(clip.id); setScreen("study");
  };

  // URL/ID 로 직접 가져오기 → 메타 조회 후 기존 추가 흐름 재사용
  const importFromUrl=async url=>{
    const r=await importVideo(url);
    if(r&&r.id) await addFromSearch(r);
    else window.alert("영상을 가져오지 못했어요. YouTube 링크 또는 영상 ID를 확인해 주세요.");
  };

  const navTop=s=>{ if(s==="settings"){setSyncOpen(true);return;}
    if(s==="search")setScreen("search"); else if(s==="library")setScreen("library");
    else if(s==="browse")setScreen("browse"); else if(s==="review")reviewAll();
    else if(s==="study"&&openId)setScreen("study"); };

  let view;
  // 첫 화면 게이트: 로그인 전(게스트 미선택)에는 앱 기능을 열지 않는다.
  if(!user && !guest){
    return <Gate configured={!!getFirebaseConfig()}
      checking={!!getFirebaseConfig() && !authChecked}
      onLogin={async()=>{ try{ await googleSignIn(); }
        catch(e){ window.alert("로그인 실패: "+String(e&&e.message||e)); } }}
      onGuest={enterGuest}
      onSaveCfg={t=>{ if(setFirebaseConfig(t)) location.reload();
        else window.alert("설정을 읽지 못했어요. Firebase 콘솔의 firebaseConfig = { … } 부분을 그대로 붙여넣어 주세요."); }}/>;
  }

  const dueN=dueCount(clips);
  if(screen==="search") view=<Search existingIds={clips.map(c=>c.id)} onAdd={addFromSearch} onImport={importFromUrl} onNav={navTop} due={dueN}/>;
  else if(screen==="browse") view=<Browse clips={clips} onNav={navTop} onOpenAt={openClipAt} due={dueN}/>;
  else if(screen==="review") view=<ReviewMode cards={review.cards} sourceLabel={review.label} nextDue={review.nextDue} onExit={exitReview} onGrade={gradeCard}/>;
  else if(screen==="study"){ const clip=clips.find(c=>c.id===openId);
    view=<Study clip={clip} initialTime={openSeek} onClose={closeClip} onReview={reviewClip} onPersist={persist} due={dueN}
      onNav={(s,upd)=>{ if(s==="study")return; persist(upd);
        if(s==="settings")setSyncOpen(true);
        else if(s==="search")setScreen("search"); else if(s==="browse")setScreen("browse");
        else if(s==="review")reviewClip(upd); else { setOpenId(null); setScreen("library"); } }}/>; }
  else view=<Library clips={clips} onOpen={openClip} onSearch={()=>setScreen("search")} onNav={navTop} onRemove={removeClip} due={dueN}/>;
  return <>{view}
    <Settings sync={sync} open={syncOpen} setOpen={setSyncOpen} hasKey={hasKey} onSaveKey={saveKey}
      onSaveApiUrl={u=>setApiUrl(u)}
      onConnect={connectGist} onDisconnect={disconnectGist} onPush={pushNow} onPull={pullNow}
      user={user} onLogin={doLogin} onLogout={doLogout}/>
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// PWA: 서비스워커 등록 (https/localhost 웹에서만 — file://·네이티브 앱은 제외)
if ("serviceWorker" in navigator && !window.Capacitor
    && (location.protocol === "https:" || location.hostname === "localhost")) {
  addEventListener("load", function(){ navigator.serviceWorker.register("./sw.js").catch(function(){}); });
}
</script>
</body>
</html>
