<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<!-- 배포(네이티브/Pages) 빌드 시 window.LISTEN_UP_API_BASE 주입 지점 (scripts/build-www.js) -->
<!--__API_BASE__-->
<title>Listening Miner</title>
<meta name="description" content="YouTube 로 배우는 영어 듣기 — 어휘 채굴 · 받아쓰기 · 간격 반복 복습" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f7" />
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141413" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icons/icon-192.png" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<style>
  :root{
    --bg:#faf9f7; --surface:#ffffff; --border:#e8e6e0; --border2:#d9d7cf;
    --text:#2c2c2a; --muted:#6f6e69; --hint:#9a988f;
    --info:#2f6db5; --info-bg:#e9f1fb; --info-bd:#bcd6f2;
    --purple:#5a4fb0; --purple-bg:#eeecfb; --purple-bd:#e0dcf6;
    --teal:#0f8466; --teal-bg:#e2f4ee;
    --danger:#b04a43; --danger-bg:#f6e9e8; --pulse:#fff3c4;
    --hoverw:#eee9dd; --mark-bg:#fdf3cf; --hintbar-bg:#fcfbf8;
    --warn:#9a6a12;
    --again-bd:#e6cac7; --again-bg:#fbf0ef;
    --soso-bd:#ecd9b0; --soso-bg:#fcf5e8;
    --good-bd:#bfe6d8; --good-bg:#eef8f4;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#141413; --surface:#1e1d1b; --border:#2e2d2a; --border2:#3d3c38;
      --text:#e8e6e1; --muted:#a3a19a; --hint:#75736c;
      --info:#7fa9df; --info-bg:#1c2836; --info-bd:#33517a;
      --purple:#a79ce0; --purple-bg:#26223a; --purple-bd:#3a3560;
      --teal:#4fbf9a; --teal-bg:#16302a;
      --danger:#e08a83; --danger-bg:#3a2422; --pulse:#4a3f1d;
      --hoverw:#33322e; --mark-bg:#4a3f1d; --hintbar-bg:#22211f;
      --warn:#d9a84e;
      --again-bd:#5a3a37; --again-bg:#2e1f1e;
      --soso-bd:#5a4a28; --soso-bg:#2c2517;
      --good-bd:#28503f; --good-bg:#17281f;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;}
  .app{max-width:1080px;margin:0 auto;padding:14px;}
  .topbar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);
    border:1px solid var(--border);border-radius:12px;margin-bottom:12px;flex-wrap:nowrap;}
  .brand{font-size:14px;font-weight:600;letter-spacing:-.01em;flex:none;}
  .modepill{font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--border2);padding:2px 8px;border-radius:6px;flex:none;}
  .nav{display:flex;gap:4px;flex:1;min-width:0;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;}
  .nav::-webkit-scrollbar{display:none;}
  .nav span{font-size:12px;color:var(--muted);padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;flex:none;}
  .nav span.on{color:var(--info);background:var(--info-bg);}
  .nav span:hover:not(.on){background:var(--bg);}
  .navset{flex:none;font-size:17px;color:var(--muted);padding:4px 7px;border-radius:8px;cursor:pointer;}
  .navset:hover{background:var(--bg);}
  .lib-head{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 12px;}
  .lib-head h2{font-size:17px;font-weight:600;margin:0;}
  .lib-head .sub{font-size:12px;color:var(--muted);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .clipcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;
    cursor:pointer;transition:border-color .12s;display:flex;flex-direction:column;}
  .clipcard:hover{border-color:var(--info-bd);}
  .thumb{aspect-ratio:16/9;background:#2c2c2a;position:relative;display:flex;align-items:center;justify-content:center;}
  .thumb .lvl{position:absolute;top:7px;left:7px;font-size:10px;font-weight:600;background:rgba(255,255,255,.9);
    color:#2c2c2a;padding:2px 7px;border-radius:6px;}
  .thumb .dur{position:absolute;bottom:7px;right:7px;font-size:10px;background:rgba(0,0,0,.6);color:#fff;
    padding:2px 6px;border-radius:5px;font-variant-numeric:tabular-nums;}
  .thumb .prog{position:absolute;bottom:0;left:0;height:3px;background:var(--info);z-index:2;}
  .thumb .ic{font-size:26px;color:#cfcdc5;}
  .thimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .thumb .lvl,.thumb .dur,.thumb .del{z-index:2;}
  /* 검색창 */
  .qrow{display:flex;gap:8px;align-items:center;}
  .qin{flex:1;min-width:0;height:40px;font-size:14px;border:1.5px solid var(--border2);border-radius:10px;
    padding:0 13px;font-family:inherit;color:var(--text);background:var(--surface);}
  .qin:focus{outline:none;border-color:var(--info);}
  .qbtn{height:40px;display:flex;align-items:center;white-space:nowrap;}
  .qhist{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
  .thumb .del{position:absolute;top:7px;right:7px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);color:#fff;border-radius:6px;font-size:12px;cursor:pointer;opacity:0;transition:opacity .12s;z-index:2;}
  .clipcard:hover .thumb .del{opacity:1;}
  .thumb .del:hover{background:var(--danger);}
  .clipcard .body{padding:9px 11px 11px;flex:1;display:flex;flex-direction:column;}
  .clipcard .ttl{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:5px;}
  .clipcard .tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
  .clipcard .t{font-size:9.5px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:1px 6px;border-radius:6px;}
  .clipcard .meta{display:flex;gap:10px;font-size:10.5px;color:var(--hint);margin-top:auto;align-items:center;}
  .clipcard .meta b{color:var(--muted);font-weight:600;}
  .clipcard .cont{font-size:10px;color:var(--info);margin-top:6px;}
  .newbtn{background:var(--surface);border:1px dashed var(--border2);border-radius:12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);
    min-height:160px;font-size:13px;gap:6px;}
  .newbtn:hover{border-color:var(--info-bd);color:var(--info);}
  .newbtn .pl{font-size:24px;}
  .clip{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 12px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;}
  .clip .l{display:flex;align-items:center;gap:10px;min-width:0;}
  .clip .back{font-size:12px;color:var(--muted);cursor:pointer;border:1px solid var(--border2);
    border-radius:8px;padding:4px 9px;white-space:nowrap;}
  .clip .back:hover{background:var(--bg);}
  .clip b{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .clip small{font-size:11px;color:var(--hint);white-space:nowrap;}
  .main{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(280px,1fr);gap:14px;}
  @media(max-width:760px){.main{grid-template-columns:1fr;}.grid{grid-template-columns:1fr 1fr;}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;}
  .player{aspect-ratio:16/9;background:#2c2c2a;border-radius:11px 11px 0 0;display:flex;
    align-items:center;justify-content:center;position:relative;}
  .ctrl{display:flex;align-items:center;gap:8px;padding:8px 11px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .pill{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--border2);
    background:var(--surface);cursor:pointer;color:var(--text);user-select:none;}
  .pill:hover{background:var(--bg);}
  .pill.on{background:var(--info-bg);border-color:var(--info-bd);color:var(--info);}
  .sep{width:1px;height:16px;background:var(--border);}
  .hintbar{font-size:11.5px;color:var(--muted);padding:7px 12px;border-bottom:1px solid var(--border);
    background:var(--hintbar-bg);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .hintbar .kbd{font-size:11px;padding:1px 6px;border-radius:5px;background:var(--bg);border:1px solid var(--border2);}
  .hintbar.active{background:var(--info-bg);color:var(--info);}
  .tx{padding:6px 4px;max-height:340px;overflow-y:auto;}
  .ln{display:flex;gap:9px;padding:5px 9px;border-radius:8px;align-items:flex-start;}
  .ln.cur{background:var(--info-bg);}
  .ln .ts{font-size:10px;color:var(--hint);min-width:34px;padding-top:5px;cursor:pointer;font-variant-numeric:tabular-nums;}
  .ln .ts:hover{color:var(--info);text-decoration:underline;}
  .ln p{margin:0;font-size:14.5px;flex:1;user-select:none;-webkit-user-select:none;}
  .w{cursor:pointer;border-radius:4px;padding:0 1px;transition:background .08s;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  .w:hover{background:var(--hoverw);}
  .w.mined{box-shadow:inset 0 -2px 0 var(--info-bd);}
  .w.anchor{background:var(--info);color:#fff;}
  .w.pulse{animation:pulse .6s ease;}
  @keyframes pulse{0%{background:var(--pulse);}100%{background:transparent;}}
  .bm{cursor:pointer;color:var(--hint);font-size:13px;padding-top:4px;}
  .bm:hover{color:var(--info);}
  .panel{display:flex;flex-direction:column;min-height:420px;}
  .tabs{display:flex;border-bottom:1px solid var(--border);}
  .tabs div{flex:1;text-align:center;font-size:12.5px;padding:10px 0;cursor:pointer;color:var(--muted);}
  .tabs div.on{color:var(--text);font-weight:600;box-shadow:inset 0 -2px 0 var(--info);}
  .tabs .cnt{font-size:10px;color:var(--hint);margin-left:4px;}
  .list{padding:10px;display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;max-height:430px;}
  .empty{font-size:12px;color:var(--hint);text-align:center;padding:30px 10px;line-height:1.7;}
  .item{border:1px solid var(--border);border-radius:9px;padding:8px 10px;position:relative;background:var(--surface);}
  .item .x{position:absolute;top:6px;right:7px;font-size:12px;color:var(--hint);cursor:pointer;
    width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:5px;}
  .item .x:hover{background:var(--danger-bg);color:var(--danger);}
  .item .hd{display:flex;align-items:center;gap:6px;margin-bottom:3px;padding-right:18px;flex-wrap:wrap;}
  .item .hw{font-size:13px;font-weight:600;}
  .item .ts2{font-size:10px;color:var(--info);cursor:pointer;font-variant-numeric:tabular-nums;}
  .item .ts2:hover{text-decoration:underline;}
  .badge{font-size:9.5px;padding:1px 6px;border-radius:6px;font-weight:600;}
  .b-word{background:var(--info-bg);color:var(--info);}
  .b-phrase{background:var(--purple-bg);color:var(--purple);}
  .b-sent{background:var(--teal-bg);color:var(--teal);}
  .item .ctx{font-size:11px;color:var(--muted);line-height:1.5;margin:2px 0 6px;}
  .item .ctx mark{background:var(--mark-bg);color:inherit;padding:0 1px;border-radius:3px;}
  .metarow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .tag{font-size:9.5px;color:var(--purple);background:var(--purple-bg);border:1px solid var(--purple-bd);padding:2px 8px;border-radius:7px;cursor:text;user-select:none;}
  .tag:hover{filter:brightness(.97);}
  .tag-add{color:var(--hint);background:var(--bg);border:1px dashed var(--border2);}
  .loadingtag{font-size:9.5px;color:var(--hint);font-style:italic;}
  .reveal{font-size:10.5px;color:var(--info);cursor:pointer;user-select:none;margin-left:auto;}
  .reveal:hover{text-decoration:underline;}
  .meaning{margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);}
  .meaning .ko{font-size:12.5px;color:var(--text);}
  .meaning .en{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;}
  .meaning .ph{font-size:11px;color:var(--hint);}
  .foot{padding:9px 10px;border-top:1px solid var(--border);}
  .foot .row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:7px;}
  .review{width:100%;font-size:12.5px;padding:8px 0;border-radius:8px;border:1px solid var(--info-bd);
    background:var(--info-bg);color:var(--info);cursor:pointer;font-weight:600;font-family:inherit;}
  .note-mock{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2c2c2a;color:#fff;
    font-size:12.5px;padding:8px 16px;border-radius:9px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:20;}
  .toast.show{opacity:1;}
  .rv-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .rv-top .close{font-size:13px;color:var(--muted);cursor:pointer;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:5px 11px;}
  .rv-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .rv-bar i{display:block;height:100%;background:var(--info);transition:width .25s;}
  .rv-bar-txt{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .rv-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px 24px;text-align:center;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .rv-play{width:64px;height:64px;border-radius:50%;background:#2c2c2a;color:#fff;font-size:24px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .rv-play:hover{background:#41413d;}
  .rv-seg{font-size:11px;color:var(--hint);margin-top:10px;font-variant-numeric:tabular-nums;}
  .rv-q{font-size:13px;color:var(--muted);margin-top:18px;}
  .rv-show{margin-top:20px;font-size:13px;color:var(--info);background:var(--info-bg);border:1px solid var(--info-bd);border-radius:9px;padding:9px 22px;cursor:pointer;font-family:inherit;font-weight:600;}
  .rv-hw{font-size:24px;font-weight:600;letter-spacing:-.01em;}
  .rv-badge{display:inline-block;margin-top:8px;}
  .rv-ko{font-size:15px;margin-top:14px;}
  .rv-en{font-size:12.5px;color:var(--muted);font-style:italic;margin-top:4px;}
  .rv-ctx{font-size:13px;color:var(--muted);margin-top:16px;line-height:1.6;max-width:440px;}
  .rv-ctx mark{background:var(--mark-bg);padding:0 2px;border-radius:3px;}
  .rv-replay{margin-top:16px;font-size:12px;color:var(--info);cursor:pointer;background:none;border:none;font-family:inherit;}
  .rv-rate{display:flex;gap:10px;margin-top:24px;}
  .rv-rate button{font-family:inherit;font-size:13px;font-weight:600;padding:11px 0;width:96px;border-radius:10px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);}
  .rv-again{color:var(--danger);border-color:var(--again-bd);} .rv-again:hover{background:var(--again-bg);}
  .rv-soso{color:var(--warn);border-color:var(--soso-bd);} .rv-soso:hover{background:var(--soso-bg);}
  .rv-good{color:var(--teal);border-color:var(--good-bd);} .rv-good:hover{background:var(--good-bg);}
  .rv-done{text-align:center;padding:44px 20px;} .rv-done .big{font-size:40px;}
  .rv-done h3{font-size:18px;margin:10px 0 4px;} .rv-done p{font-size:13px;color:var(--muted);margin:0 0 18px;}
  .rv-empty{text-align:center;padding:50px 20px;color:var(--hint);font-size:13px;line-height:1.7;}
  .rv-src{font-size:11px;color:var(--hint);margin-bottom:14px;}
  .sbar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:14px;}
  .frow{display:flex;align-items:flex-start;gap:12px;margin-bottom:11px;flex-wrap:wrap;}
  .frow:last-child{margin-bottom:0;}
  .flab{font-size:12px;color:var(--muted);min-width:62px;padding-top:5px;}
  .range{display:flex;align-items:center;gap:10px;flex:1;min-width:220px;}
  .range input[type=range]{flex:1;min-width:80px;}
  .rdo{font-size:12px;color:var(--info);font-weight:600;min-width:74px;text-align:right;font-variant-numeric:tabular-nums;}
  .chip{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text);user-select:none;}
  .chip .chip-x{margin-left:6px;opacity:.45;font-weight:700;}
  .chip .chip-x:hover{opacity:1;color:#cf4b4b;}
  .chip.on{background:var(--info-bg);border-color:var(--info-bd);color:var(--info);}
  .addbtn{font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:8px;border:1px solid var(--info-bd);background:var(--info-bg);color:var(--info);cursor:pointer;user-select:none;}
  .addbtn:hover{filter:brightness(.97);}
  .addbtn.added,.addbtn.busy{background:var(--bg);border-color:var(--border);color:var(--hint);cursor:default;}
  .resmeta{font-size:10.5px;color:var(--hint);}
  .nores{text-align:center;color:var(--hint);font-size:13px;padding:36px 20px;}
  /* Gist 동기화 위젯 */
  .sync-fab{position:fixed;right:calc(14px + env(safe-area-inset-right,0px));bottom:calc(16px + env(safe-area-inset-bottom,0px));z-index:900;display:flex;align-items:center;gap:6px;
    padding:7px 11px;border-radius:999px;border:1px solid var(--border2);background:var(--surface);
    color:var(--text);font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#b9b7af;display:inline-block;}
  .sync-dot.s-ok{background:#3a9d5d;} .sync-dot.s-error{background:#cf4b4b;}
  .sync-dot.s-syncing,.sync-dot.s-dirty{background:#d99a2b;}
  .sync-msg{font-size:11px;color:var(--muted);}
  .sync-modal{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.32);display:flex;
    align-items:center;justify-content:center;padding:18px;}
  .sync-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
    width:100%;max-width:360px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.2);}
  .sync-h{font-weight:700;font-size:15px;display:flex;align-items:center;}
  .sync-h .x{margin-left:auto;cursor:pointer;color:var(--muted);}
  .sync-p{font-size:13px;color:var(--text);line-height:1.6;margin:12px 0;}
  .sync-p code{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:1px 5px;font-size:12px;}
  .sync-in{width:100%;box-sizing:border-box;padding:9px 11px;border:1px solid var(--border2);
    border-radius:9px;font-size:13px;margin-bottom:10px;background:var(--bg);color:var(--text);}
  .sync-row{display:flex;gap:8px;}
  .sync-btn{flex:1;padding:9px 12px;border-radius:9px;border:1px solid var(--border2);
    background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;margin-top:8px;}
  .sync-btn.primary{background:var(--info);border-color:var(--info);color:#fff;width:100%;}
  .sync-btn.danger{color:#cf4b4b;border-color:#e3c2c2;width:100%;}
  .sync-link{display:inline-block;margin-top:10px;font-size:12px;color:var(--info);text-decoration:none;}
  .sync-note{font-size:11px;color:var(--hint);margin-top:12px;line-height:1.5;}
  .sec-t{font-size:13px;font-weight:700;color:var(--text);margin-top:4px;}
  .sec-t .muted{font-weight:400;color:var(--muted);font-size:12px;}
  .tx-empty{padding:26px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.9;}
  /* 받아쓰기(딕테이션) */
  .dict{padding:11px 12px;border-bottom:1px solid var(--border);background:var(--hintbar-bg);}
  .dict .dhd{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .dict .dhd b{color:var(--text);}
  .dict .dhd .x{margin-left:auto;cursor:pointer;color:var(--hint);font-size:13px;padding:2px 6px;border-radius:6px;}

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ════════════════════════════════════════════════════════
   LISTENING MINER — 영어 듣기 학습 (프런트엔드, 단일 파일)

   상태: 백엔드 연동 완료 · 실제 재생까지 동작.
     · 데이터: 아래 [API LAYER] 가 서버(/api/*) 호출 (USE_BACKEND=true).
     · 재생: YouTube IFrame API 실제 플레이어 (Study·Review 컴포넌트).
   백엔드 계약(서버가 구현하는 엔드포인트):
       POST /api/analyze     {text,type}        → {ko,en,tag}
       POST /api/search      {minSec,maxSec,...} → [{id,title,...}]
       POST /api/transcript  {videoId}          → [{start,end,text}]
   · analyze 의 tag 는 반드시 FUNCTION_TAGS 안의 값만 (서버에서 강제).
   · mock 으로 되돌리려면 USE_BACKEND=false (mock 구현은 그대로 보존).
   ════════════════════════════════════════════════════════ */

/* ── 기능 태그 프리셋 (사용자 단어장에서 추출·확정) ──────
   analyze 백엔드는 이 목록을 시스템 프롬프트에 넣어 이 안에서만 tag 를 고르게 할 것 */
const FUNCTION_TAGS=[
  {group:"묘사·진술",tags:["상태","변화","움직임","감각","생각·판단","추측","전언","인과·사건","사역·유발","상황·조건","장소·공간","묘사·설명","시간","강조","정도·수량","성향·성격"]},
  {group:"요청·해결",tags:["부탁·바람","제안·충고","설득·강요","허락","시도·노력","어려움·문제","쉬움·수월","성공·해결","금지·방해","거절·꺼림","궁금·확인"]},
  {group:"의지·추측",tags:["계획·의도","의무·확신","결심","가정"]},
  {group:"논리·주장",tags:["의견·주장","포함·관계","반박·대조","따지기·반문","인과·결론","경고·비난","비교","화제 전환"]},
  {group:"감정·경험",tags:["감사·기쁨","슬픔·미움","짜증·화남","우려·사과","공감","안정","선택·기회","취향·취미","돈·시간","배움·목표"]},
];

/* ════════════════════════════════════════════════════════
   API LAYER  ←★ 백엔드 연동은 여기만 수정
   ════════════════════════════════════════════════════════ */
const USE_BACKEND = true;                   // ←★ 켜짐: /api/analyze 호출 (mock 끄려면 false)

// Capacitor 네이티브 앱 여부 (study-app 방식: isNativeApp() 로 웹/네이티브 분기)
function isNativeApp(){
  return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === "function"
    && window.Capacitor.isNativePlatform());
}

// API 서버 주소 (런타임 설정): 앱 ⚙ 설정값(localStorage)이 최우선 → 빌드 주입값 →
// file://·네이티브면 localhost → 같은 출처(""). Pages·모바일에선 ⚙ 에 호스팅 주소만 넣으면 됨.
const API_URL_KEY = "listen-up.apiBase";
function getApiUrl(){ try{ return localStorage.getItem(API_URL_KEY) || ""; }catch(e){ return ""; } }
function setApiUrl(u){ u=(u||"").trim().replace(/\/+$/,"");
  if(u) localStorage.setItem(API_URL_KEY,u); else localStorage.removeItem(API_URL_KEY); }
// 기본 백엔드(Render) — Pages 등에서 ⚙ 설정이 없어도 바로 동작. ⚙ 입력값이 항상 우선.
const DEFAULT_API_BASE = "https://listen-up-api-g6fk.onrender.com";
function apiBase(){
  const s=getApiUrl(); if(s) return s;
  if(typeof window.LISTEN_UP_API_BASE === "string" && window.LISTEN_UP_API_BASE) return window.LISTEN_UP_API_BASE;
  if(location.protocol === "file:" || isNativeApp()) return "http://localhost:3001";
  if(/\.github\.io$/.test(location.hostname)) return DEFAULT_API_BASE;
  return ""; // 서버 같은 출처(상대경로 — 로컬 서버가 프런트를 직접 서빙하는 경우)
}
const MOCK_DELAY  = 250;                     // mock 지연(ms) — 실제 로딩 UX 확인용, 백엔드 붙이면 무관

// Anthropic API 키 — 앱 ⚙ 설정에서 입력해 localStorage 에 보관, analyze 요청 헤더로 전달.
// (.env 대신 앱에서 입력 — study-app 의 토큰 입력 방식과 동일)
let ANTHROPIC_KEY = localStorage.getItem("anthropic_key") || "";
function getAnthropicKey(){ return ANTHROPIC_KEY; }
function setAnthropicKey(k){ ANTHROPIC_KEY=(k||"").trim();
  if(ANTHROPIC_KEY) localStorage.setItem("anthropic_key",ANTHROPIC_KEY); else localStorage.removeItem("anthropic_key"); }

// Supadata 자막 API 키 — 클라우드(Render)에서도 자막을 받기 위한 키. ⚙ 설정에서 입력해
// localStorage 에 보관, transcript 요청 헤더로 전달(코드·저장소엔 저장 안 됨).
let SUPADATA_KEY = localStorage.getItem("supadata_key") || "";
function getSupadataKey(){ return SUPADATA_KEY; }
function setSupadataKey(k){ SUPADATA_KEY=(k||"").trim();
  if(SUPADATA_KEY) localStorage.setItem("supadata_key",SUPADATA_KEY); else localStorage.removeItem("supadata_key"); }

const sleep = ms => new Promise(r=>setTimeout(r,ms));

// POST /api/analyze   body:{ text, type:"word"|"phrase"|"sentence" }
//   → { ko:string, en:string, tag:string }   (tag 는 FUNCTION_TAGS 안의 값 또는 "")
async function analyze(text, type){
  if(USE_BACKEND){
    // 0) 공유 분석 캐시 — 누군가 이미 분석한 단어·구문이면 API 호출 없이 즉시 반환
    const hit=await cacheGetAnalyze(text,type);
    if(hit) return hit;
    try{
      const res=await fetch(apiBase()+"/api/analyze",{method:"POST",
        headers:{"Content-Type":"application/json", ...(ANTHROPIC_KEY?{"x-anthropic-key":ANTHROPIC_KEY}:{})},
        body:JSON.stringify({text,type})});
      if(!res.ok) throw new Error("analyze "+res.status);
      const a=await res.json();
      if(a&&(a.ko||a.en)) cacheSetAnalyze(text,type,a); // 백그라운드 캐시 저장
      return a;
    }catch(e){ console.error("analyze failed:",e); return {ko:"",en:"",tag:""}; }
  }
  await sleep(MOCK_DELAY); return mockAnalyze(text,type);
}

// POST /api/search   body:{ minSec, maxSec, level, topics:string[], page }
//   → 응답은 NDJSON 스트림(결과 1건당 한 줄). onResult(item) 으로 오는 대로 전달하고,
//     전체 배열을 반환한다(onResult 없으면 모아서 반환 — 하위호환).
async function searchVideos(filters, onResult){
  if(USE_BACKEND){
    try{
      const res=await fetch(apiBase()+"/api/search",{method:"POST",
        headers:{"Content-Type":"application/json", ...(ANTHROPIC_KEY?{"x-anthropic-key":ANTHROPIC_KEY}:{})},
        body:JSON.stringify(filters)});
      if(!res.ok) throw new Error("search "+res.status);
      const out=[];
      const emit=line=>{ const t=line.trim(); if(!t) return;
        try{ const item=JSON.parse(t); out.push(item); if(onResult) onResult(item); }catch(e){} };
      if(res.body && res.body.getReader){          // 스트리밍: 오는 대로 한 줄씩 파싱
        const reader=res.body.getReader(), dec=new TextDecoder(); let buf="";
        for(;;){ const {value,done}=await reader.read(); if(done) break;
          buf+=dec.decode(value,{stream:true});
          let nl; while((nl=buf.indexOf("\n"))>=0){ emit(buf.slice(0,nl)); buf=buf.slice(nl+1); } }
        emit(buf);
      }else{                                       // 폴백: 한 번에 받아 줄 단위 파싱
        (await res.text()).split("\n").forEach(emit);
      }
      return out;
    }catch(e){ console.error("search failed:",e); return []; }
  }
  await sleep(120); const r=mockSearch(filters); if(onResult) r.forEach(onResult); return r;
}

// POST /api/level-titles   body:{ items:[{id,title,channel}] } → { levels:{id:"A2"|"B1"|"B2"|"C1"} }
// 검색 결과의 난이도를 제목 기반으로 대략 분류 (서버 캐시·Haiku). 키 없거나 실패 시 {}.
async function classifyLevels(items){
  if(!USE_BACKEND || !items.length || !ANTHROPIC_KEY) return {};
  try{
    const res=await fetch(apiBase()+"/api/level-titles",{method:"POST",
      headers:{"Content-Type":"application/json","x-anthropic-key":ANTHROPIC_KEY},
      body:JSON.stringify({items:items.map(r=>({id:r.id,title:r.title,channel:r.channel}))})});
    if(!res.ok) return {};
    return (await res.json()).levels||{};
  }catch(e){ return {}; }
}

// POST /api/transcript   body:{ videoId }
//   → [{ start:seconds, end:seconds, text }]
//   ⚠ 유튜브 자막은 공식 API가 없어 비공식 추출에 의존 → 가장 잘 깨지는 지점. 실패 시 [] 반환·UI 처리 필요.
async function fetchTranscript(videoId){
  if(USE_BACKEND){
    // 0) 공유 자막 캐시(Firestore) — 누군가 한 번 뽑은 영상은 추출 API 를 다시 쓰지 않는다.
    //    (Supadata 월 한도 절약 + 즉시 로드. 문장부호 복원 결과까지 그대로 재사용)
    const hit=await cacheGetTranscript(videoId);
    if(hit) return hit;
    try{
      const res=await fetch(apiBase()+"/api/transcript",{method:"POST",
        headers:{"Content-Type":"application/json",
          ...(SUPADATA_KEY?{"x-supadata-key":SUPADATA_KEY}:{}),
          ...(ANTHROPIC_KEY?{"x-anthropic-key":ANTHROPIC_KEY}:{})}, // 자동자막 문장부호 복원용
        body:JSON.stringify({videoId})});
      if(!res.ok) throw new Error("transcript "+res.status);
      const segs=await res.json();
      if(Array.isArray(segs)&&segs.length) cacheSetTranscript(videoId,segs); // 백그라운드 캐시 저장
      return segs;
    }catch(e){ console.error("transcript failed:",e); return []; }
  }
  await sleep(MOCK_DELAY); return mockTranscript(videoId);
}

// POST /api/import   body:{ url }
//   → { id, title, channel, level, topics, total }   (URL/ID 로 직접 가져오기; 대본 미포함)
async function importVideo(url){
  if(USE_BACKEND){
    try{
      const res=await fetch(apiBase()+"/api/import",{method:"POST",
        headers:{"Content-Type":"application/json"},body:JSON.stringify({url})});
      if(!res.ok) throw new Error("import "+res.status);
      return await res.json();
    }catch(e){ console.error("import failed:",e); return null; }
  }
  await sleep(MOCK_DELAY); return null; // mock 모드에선 미지원
}

/* ── mock 구현 (USE_BACKEND=true 면 호출 안 됨) ───────────── */
function mockAnalyze(text,type){
  const key=text.toLowerCase().replace(/[.,!?;:]+$/,"").trim();
  if(LEX[key]) return {...LEX[key]};
  return {ko:"",en:"",tag:""};
}
function mockSearch({minSec,maxSec,maxLevel,topics}){
  return RESULTS
    .filter(r=>{
      if(r.total<minSec||r.total>maxSec) return false;
      if(LEVELS.indexOf(r.level)>LEVELS.indexOf(maxLevel)) return false;
      if(topics.length && !r.topics.some(t=>topics.includes(t))) return false;
      return true;
    })
    .map(({tx,...meta})=>meta); // 실제 /api/search 처럼 대본은 빼고 메타데이터만
}
function mockTranscript(videoId){ const r=RESULTS.find(x=>x.id===videoId); return r?r.tx:[]; }

/* ════════════════════════════════════════════════════════
   MOCK DATA  ←★ 백엔드 붙이면 전부 불필요 (서버가 대체)

// 난이도 칩(0~4) → 맞는 CEFR 집합. 분류된 결과를 "선택 난이도 우선"으로 정렬할 때 사용.
const CEFR_ORDER=["A2","B1","B2","C1"];
const LVL_TARGET=[["A2"],["A2","B1"],["B1","B2"],["B2","C1"],["C1"]];
function sortByLevel(rs,lvl){
  const t=LVL_TARGET[lvl]||[];
  if(!t.length) return rs;
  const rank=r=>{ if(!r.level) return 1.5;                                  // 미상: 중간
    if(t.includes(r.level)) return 0;                                        // 딱 맞음: 맨 위
    return 1+Math.min(...t.map(x=>Math.abs(CEFR_ORDER.indexOf(x)-CEFR_ORDER.indexOf(r.level)))); };
  return [...rs].sort((a,b)=>rank(a)-rank(b));                               // 안정 정렬: 순위 내 순서 유지
}

/* ── 받아쓰기 채점: 정답 문장 vs 입력을 단어 단위(LCS)로 맞춰 정확도 계산 ── */
function normW(w){ return String(w).toLowerCase().replace(/[^a-z0-9']/g,""); }
function diffWords(refText, typedText){
  const refTok=String(refText).split(/\s+/).filter(Boolean);
  const refN=refTok.map(normW);
  const typN=String(typedText).split(/\s+/).map(normW).filter(Boolean);
  const m=refN.length, n=typN.length;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=m-1;i>=0;i--)for(let j=n-1;j>=0;j--)
    dp[i][j]=(refN[i]&&refN[i]===typN[j])?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  const okRef=new Set(); let i=0,j=0;
  while(i<m&&j<n){ if(refN[i]&&refN[i]===typN[j]){ okRef.add(i); i++; j++; }
    else if(dp[i+1][j]>=dp[i][j+1]) i++; else j++; }
  const scored=refN.filter(Boolean).length;
  const acc=scored?Math.round(okRef.size/scored*100):0;
  return { tokens:refTok.map((w,idx)=>({w, ok:okRef.has(idx)||!refN[idx]})), acc, extra:Math.max(0,n-okRef.size) };
}

/* YouTube IFrame API 로더 — 한 번만 로드하고 준비되면 resolve */
let _ytApiPromise;
function loadYouTubeAPI(){
  if(_ytApiPromise) return _ytApiPromise;
  _ytApiPromise=new Promise(resolve=>{
    if(window.YT && window.YT.Player){ resolve(window.YT); return; }
    const prev=window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady=()=>{ if(prev)prev(); resolve(window.YT); };
    const tag=document.createElement("script");
    tag.src="https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  });
  return _ytApiPromise;
}

function Study({clip,initialTime,onClose,onReview,onNav,onPersist,due}){
  const [time,setTime]=useState(initialTime!=null?initialTime:(clip.pos||0));
  const [playing,setPlaying]=useState(false);
  const [speed,setSpeed]=useState(1);
  const [tab,setTab]=useState("vocab");
  const panelRef=useRef(null);   // 어휘 패널 바로가기 스크롤용
  const [vocab,setVocab]=useState(clip.vocab);
  const [marks,setMarks]=useState(clip.marks);
  const [phraseMode,setPhraseMode]=useState(false);
  const [dict,setDict]=useState(null);      // 받아쓰기: {li, typed, checked, res}
  const dictStopRef=useRef(null);           // 받아쓰기 재생 시 문장 끝 시각(도달하면 일시정지)
  const [anchor,setAnchor]=useState(null);
  const [pulse,setPulse]=useState(null);
  const [toast,setToast]=useState("");
  const toastT=useRef();
  const playerRef=useRef(null);   // YT.Player 인스턴스
  const ytBoxRef=useRef(null);    // 플레이어가 들어갈 div
  const txBoxRef=useRef(null);    // 대본 스크롤 컨테이너
  const curLineRef=useRef(null);  // 현재 재생 줄
  const TX=clip.transcript, TOTAL=clip.total;
  const curIdx=TX.findIndex(l=>time>=l.start && time<l.end);
  // 항상 최신 vocab/marks 를 가리키는 ref (길이 저장 시 방금 추가한 어휘를 덮어쓰지 않도록)
  const vocabRef=useRef(vocab); vocabRef.current=vocab;
  const marksRef=useRef(marks); marksRef.current=marks;

  // 영상 흐름 따라 현재 줄 자동 스크롤 (화면 밖으로 나갈 때만 가운데로 — 수동 스크롤 방해 최소화)
  useEffect(()=>{
    const box=txBoxRef.current, line=curLineRef.current;
    if(!box||!line||curIdx<0) return;
    const b=box.getBoundingClientRect(), l=line.getBoundingClientRect();
    if(l.top>=b.top && l.bottom<=b.bottom) return; // 이미 보이면 그대로
    const delta=(l.top-b.top)-(box.clientHeight/2 - line.clientHeight/2);
    box.scrollTo({top:box.scrollTop+delta, behavior:"smooth"});
  },[curIdx]);

  // 어휘·책갈피가 바뀌면 즉시 라이브러리에 반영 (학습 중 앱을 바로 꺼도 안 사라지게)
  useEffect(()=>{ if(onPersist) onPersist({...clip,vocab,marks,pos:Math.round(time),plays:clip.plays}); },[vocab,marks]);

  /* 실제 YouTube IFrame 플레이어 — 마운트 시 생성해 clip.id 영상을 로드.
     (React 충돌 방지를 위해 ytBox 안에 host div 를 직접 만들어 YT 가 교체하게 함) */
  useEffect(()=>{
    let destroyed=false;
    loadYouTubeAPI().then(YT=>{
      if(destroyed||!ytBoxRef.current) return;
      const host=document.createElement("div");
      host.style.width="100%"; host.style.height="100%";
      ytBoxRef.current.appendChild(host);
      playerRef.current=new YT.Player(host,{
        videoId:clip.id, width:"100%", height:"100%",
        playerVars:{rel:0, modestbranding:1, playsinline:1},
        events:{
          onReady:()=>{ try{ playerRef.current.setPlaybackRate(speed);
            if(time>0) playerRef.current.seekTo(time,true); }catch(e){} },
          onStateChange:e=>{ const S=window.YT.PlayerState;
            if(e.data===S.PLAYING) setPlaying(true);
            else if(e.data===S.PAUSED||e.data===S.ENDED) setPlaying(false); },
        },
      });
    });
    return ()=>{ destroyed=true;
      try{ playerRef.current && playerRef.current.destroy(); }catch(e){}
      playerRef.current=null;
      if(ytBoxRef.current) ytBoxRef.current.innerHTML=""; };
  },[clip.id]);

  /* 재생 중에는 플레이어의 현재시간을 폴링해 time 갱신 (+ 듣기 통계 · 받아쓰기 문장끝 정지) */
  useEffect(()=>{
    if(!playing) return;
    const iv=setInterval(()=>{
      const p=playerRef.current; if(!p||!p.getCurrentTime) return;
      const t=p.getCurrentTime(); setTime(t);
      statAddListen(0.2);
      if(dictStopRef.current!=null && t>=dictStopRef.current){
        dictStopRef.current=null; try{ p.pauseVideo(); }catch(e){} setPlaying(false);
      }
    },200);
    return ()=>clearInterval(iv);
  },[playing]);

  // 길이(total)를 모르면(0) 플레이어에서 실제 길이를 읽어 한 번 저장 → "0:00" 교정
  useEffect(()=>{
    if(TOTAL) return;
    const iv=setInterval(()=>{
      const p=playerRef.current; if(!p||!p.getDuration) return;
      let d=0; try{ d=Math.round(p.getDuration()); }catch(e){ return; }
      if(d>0){ clearInterval(iv);
        if(onPersist) onPersist({...clip,vocab:vocabRef.current,marks:marksRef.current,pos:Math.round(time),plays:clip.plays,total:d}); }
    },500);
    return ()=>clearInterval(iv);
  },[TOTAL]);

  const flash=m=>{ setToast(m); clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToast(""),1500); };

  // 오늘 듣기 목표를 넘긴 순간 축하 (statAddListen 이 하루 1회 발행)
  useEffect(()=>{
    const h=()=>{ setToast("🎉 오늘 듣기 목표 "+getGoalMin()+"분 달성!");
      clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToast(""),3000); };
    window.addEventListener("lu-goal-done",h);
    return ()=>window.removeEventListener("lu-goal-done",h);
  },[]);
  const seek=s=>{ setTime(s); try{ playerRef.current && playerRef.current.seekTo(s,true); }catch(e){} };
  const cur=()=>({...clip,vocab,marks,pos:Math.round(time),plays:clip.plays});
  const save=()=>onClose({...clip,vocab,marks,pos:Math.round(time),plays:clip.plays+(time>2?1:0)});

  const cycleSpeed=()=>{ const seq=[0.75,1,1.25,1.5]; const ns=seq[(seq.indexOf(speed)+1)%seq.length];
    setSpeed(ns); try{ playerRef.current && playerRef.current.setPlaybackRate(ns); }catch(e){} };
  const goVocab=()=>{ setTab("vocab"); try{ panelRef.current && panelRef.current.scrollIntoView({behavior:"smooth",block:"start"}); }catch(e){} };

  /* 저장: 카드 먼저 띄우고(optimistic) → analyze 비동기 → 결과 채움 */
  const addVocab=async (type,text,li)=>{
    const id=uid();
    setVocab(v=>[{id,type,text,sentence:TX[li].text,ts:TX[li].start,te:TX[li].end,ko:"",en:"",tag:"",loading:true},...v]);
    statBump("vocab");
    setTab("vocab");
    flash((type==="word"?"단어":type==="phrase"?"구문":"문장")+" 저장 · 분석 중…");
    const a=await analyze(text,type);
    setVocab(v=>v.map(x=>x.id===id?{...x,ko:a.ko,en:a.en,tag:a.tag,loading:false}:x));
    if(USE_BACKEND && !getAnthropicKey() && !a.ko && !a.en && !a.tag)
      flash("⚙ 설정에서 Anthropic 키를 입력하면 뜻·태그가 자동 분석돼요");
  };
  const setTag=(id,tag)=>setVocab(v=>v.map(x=>x.id===id?{...x,tag}:x));
  // 빈 분석 다시 시도 (키 설정 후 등)
  const reanalyze=async it=>{
    setVocab(v=>v.map(x=>x.id===it.id?{...x,loading:true}:x));
    const a=await analyze(it.text,it.type);
    setVocab(v=>v.map(x=>x.id===it.id?{...x,ko:a.ko,en:a.en,tag:a.tag,loading:false}:x));
    if(USE_BACKEND && !getAnthropicKey() && !a.ko && !a.en && !a.tag)
      flash("⚙ 설정에서 Anthropic 키를 입력하면 뜻·태그가 분석돼요");
  };
  const onWord=(li,wi,tok)=>{
    if(phraseMode){
      if(!anchor){ setAnchor({li,wi}); return; }
      if(anchor.li!==li){ setAnchor({li,wi}); return; }
      const a=Math.min(anchor.wi,wi), b=Math.max(anchor.wi,wi);
      addVocab("phrase",clean(TX[li].text.split(/\s+/).slice(a,b+1).join(" ")),li);
      setAnchor(null); setPhraseMode(false);
    }else{ setPulse(li+":"+wi); setTimeout(()=>setPulse(null),600); addVocab("word",clean(tok),li); }
  };
  /* 받아쓰기: 문장 듣고 타이핑 → 단어 단위 채점 */
  const openDict=()=>{ if(!TX.length){ flash("자막이 있어야 받아쓰기를 할 수 있어요"); return; }
    try{ playerRef.current && playerRef.current.pauseVideo(); }catch(e){} setPlaying(false);
    setDict({li:curIdx>=0?curIdx:0,typed:"",checked:false,res:null}); };
  const closeDict=()=>{ dictStopRef.current=null; setDict(null); };
  const dictPlay=()=>{ if(!dict) return; const L=TX[dict.li];
    dictStopRef.current=(L.end&&L.end>L.start)?L.end:L.start+6;
    seek(L.start); try{ playerRef.current && playerRef.current.playVideo(); }catch(e){} setPlaying(true); };
  const dictCheck=()=>{ if(!dict||!dict.typed.trim()) return;
    const res=diffWords(TX[dict.li].text, dict.typed);
    statBump("dict"); if(res.acc>=80) statBump("dictOk");
    setDict(d=>({...d,checked:true,res})); };
  const dictNext=()=>{ if(!dict) return; const li=dict.li+1;
    if(li>=TX.length){ closeDict(); flash("마지막 문장까지 끝냈어요 👏"); return; }
    setDict({li,typed:"",checked:false,res:null}); };

  const bookmarkSeg=()=>{ const l=TX[curIdx>=0?curIdx:0];
    setMarks(m=>[{id:uid(),start:l.start,end:l.end,label:l.text,note:""},...m]);
    setTab("bookmark"); flash("책갈피 · "+fmt(l.start)+"–"+fmt(l.end)); };
  const playSeg=(s)=>{ seek(s);
    try{ playerRef.current && playerRef.current.playVideo(); }catch(e){} setPlaying(true); };

  return (
    <div className="app">
      <Top screen="study" onNav={s=>onNav(s,cur())} due={due}/>
      <div className="clip">
        <div className="l"><span className="back" onClick={save}>← 라이브러리</span><b>{clip.title}</b></div>
        <small>{clip.plays>0?clip.plays+"번째 · ":""}{fmt(time)} / {fmt(TOTAL)}</small>
      </div>
      <div className="main">
        <div className="card">
          <div className="player">
            <div ref={ytBoxRef} style={{position:"absolute",inset:0,width:"100%",height:"100%"}}></div>
          </div>
          <div className="ctrl">
            <span className="pill" onClick={cycleSpeed}>{speed.toFixed(2).replace(/0$/,"")}x</span>
            <span className="sep"></span>
            <span className="pill" onClick={goVocab}>📒 어휘 {vocab.length}</span>
            <span className="sep"></span>
            <span className="pill" onClick={bookmarkSeg}>🔖 책갈피</span>
            <span className="sep"></span>
            <span className={"pill"+(phraseMode?" on":"")} onClick={()=>{setPhraseMode(m=>!m);setAnchor(null);}}>구문 잡기</span>
            <span className="sep"></span>
            <span className={"pill"+(dict?" on":"")} onClick={()=>dict?closeDict():openDict()}>✍️ 받아쓰기</span>
          </div>
          {dict && TX[dict.li] && (
            <div className="dict">
              <div className="dhd">✍️ <b>{fmt(TX[dict.li].start)}</b> 문장 받아쓰기 — 듣고 그대로 적어보세요
                <span className="x" onClick={closeDict}>✕</span></div>
              {!dict.checked ? <>
                <textarea autoFocus placeholder="들리는 대로 영어로 입력…" value={dict.typed}
                  onChange={e=>{ const v=e.target.value; setDict(d=>({...d,typed:v})); }}
                  onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); dictCheck(); } }}/>
                <div className="drow">
                  <button className="dbtn" onClick={dictPlay}>🔊 문장 듣기</button>
                  <button className="dbtn primary" onClick={dictCheck}>확인 (Enter)</button>
                </div>
              </> : <>
                <div className="dres">
                  {dict.res.tokens.map((t,i)=><React.Fragment key={i}><span className={"dw "+(t.ok?"ok":"miss")}>{t.w}</span>{" "}</React.Fragment>)}
                </div>
                <div className={"acc "+(dict.res.acc>=80?"good":"bad")}>
                  정확도 {dict.res.acc}%{dict.res.extra>0?" · 불필요한 단어 "+dict.res.extra+"개":""}{dict.res.acc>=80?" 👍":""}
                </div>
                <div className="drow">
                  <button className="dbtn" onClick={dictPlay}>↻ 다시 듣기</button>
                  <button className="dbtn" onClick={()=>setDict(d=>({...d,typed:"",checked:false,res:null}))}>다시 쓰기</button>
                  <button className="dbtn primary" onClick={dictNext}>다음 문장 →</button>
                </div>
              </>}
            </div>
          )}
          {phraseMode && (
            <div className="hintbar active">
              {anchor?"끝 단어를 탭하세요 (같은 문장 안)":"시작 단어를 탭하세요 · 버튼 다시 누르면 취소"}
            </div>
          )}
          <div className="tx" ref={txBoxRef}>
            {TX.length===0 && (
              <div className="tx-empty">
                이 영상의 자막을 못 받았어요.<br/>
                ⚙ 설정에 <b>Supadata 자막 키</b>(무료)를 넣으면 클라우드 백엔드에서도 자막이 추출됩니다.<br/>
                키 입력 후 이 클립을 삭제하고 <b>다시 추가</b>해 보세요.
              </div>
            )}
            {TX.map((l,li)=>(
              <div key={li} ref={li===curIdx?curLineRef:null}
                className={"ln"+(li===curIdx?" cur":"")+(dict&&!dict.checked&&dict.li===li?" hide":"")}>
                <span className="ts" onClick={()=>seek(l.start)}>{fmt(l.start)}</span>
                <p>
                  {l.text.split(/\s+/).map((tok,wi)=>{
                    const k=li+":"+wi;
                    const mined=vocab.some(v=>v.type==="word"&&v.text.toLowerCase()===clean(tok).toLowerCase());
                    const cls="w"+(mined?" mined":"")+(anchor&&anchor.li===li&&anchor.wi===wi?" anchor":"")+(pulse===k?" pulse":"");
                    return <React.Fragment key={wi}><span className={cls} onClick={()=>onWord(li,wi,tok)}>{tok}</span>{" "}</React.Fragment>;
                  })}
                </p>
              </div>
            ))}
          </div>
        </div>
        <div className="card panel" ref={panelRef}>
          <div className="tabs">
            <div className={tab==="vocab"?"on":""} onClick={()=>setTab("vocab")}>어휘<span className="cnt">{vocab.length}</span></div>
            <div className={tab==="bookmark"?"on":""} onClick={()=>setTab("bookmark")}>책갈피<span className="cnt">{marks.length}</span></div>
          </div>
          {tab==="vocab" ? (
            <div className="list">
              {vocab.length===0 && <div className="empty">대본의 단어를 탭하면<br/>문장·기능태그와 함께 쌓입니다</div>}
              {vocab.map(it=><VocabCard key={it.id} it={it} onSeek={seek} onRemove={id=>setVocab(v=>v.filter(x=>x.id!==id))} onTag={setTag} onReanalyze={reanalyze}/>)}
            </div>
          ) : (
            <div className="list">
              {marks.length===0 && <div className="empty">🔖 책갈피를 누르면<br/>그 구간이 여기 저장돼요</div>}
              {marks.map(m=>(
                <div className="item" key={m.id}>
                  <span className="x" onClick={()=>setMarks(v=>v.filter(x=>x.id!==m.id))}>✕</span>
                  <div className="hd"><span className="ts2" onClick={()=>playSeg(m.start)}>▶ {fmt(m.start)}–{fmt(m.end)}</span></div>
                  <div className="ctx">{m.label}</div>
                  <input style={{width:"100%",fontSize:"11px",border:"1px solid var(--border)",borderRadius:"6px",padding:"4px 7px",fontFamily:"inherit",color:"var(--text)",background:"var(--surface)"}}
                    placeholder="메모 (예: th 발음, 못 알아들음)" value={m.note}
                    onChange={e=>setMarks(v=>v.map(x=>x.id===m.id?{...x,note:e.target.value}:x))}/>
                </div>
              ))}
            </div>
          )}
          <div className="foot">
            <div className="row"><span>이 클립 저장 {vocab.length}</span><span>책갈피 {marks.length}</span></div>
            <button className="review" onClick={()=>onReview(cur())}>
              ▶ 이 클립 복습{vocab.length>0?" · "+vocab.length+"개":""}</button>
            <div className="note-mock">닫으면 이 클립에 저장돼 라이브러리에서 이어집니다</div>
          </div>
        </div>
      </div>
      <div className={"toast"+(toast?" show":"")}>{toast}</div>
    </div>
  );
}

function ReviewMode({cards,sourceLabel,nextDue,onExit,onGrade}){
  const [queue,setQueue]=useState(()=>cards.map(c=>c.id));
  const [pos,setPos]=useState(0);
  const [revealed,setRevealed]=useState(false);
  const [done,setDone]=useState(0);
  const total=cards.length;
  const byId=id=>cards.find(c=>c.id===id);
  const cur=pos<queue.length?byId(queue[pos]):null;
  const [t,setT]=useState(null);
  const [playing,setPlaying]=useState(false);
  const segEnd=useRef(null);
  const playerRef=useRef(null);
  const ytBoxRef=useRef(null);

  // 현재 카드의 "정답 문장 전체"를 재생 (te 있으면 그 끝까지, 없으면 문장 길이로 추정)
  const loadSeg=()=>{ const p=playerRef.current; if(!p||!cur) return;
    const words=(cur.sentence||"").split(/\s+/).filter(Boolean).length;
    const est=Math.min(16, Math.max(4, words*0.42));
    const end=(cur.te && cur.te>cur.ts) ? cur.te : cur.ts+est;
    segEnd.current=end+0.4; setT(cur.ts);   // 끝 단어 안 잘리게 약간 여유
    try{ if(cur.videoId) p.cueVideoById({videoId:cur.videoId, startSeconds:cur.ts}); }catch(e){} // 자동재생 X — 🔊 버튼으로
    /* playing 은 onStateChange 가 실제 재생 상태로 설정 (자동재생 차단 대비) */ };

  // 숨긴 YouTube 플레이어 1회 생성 (오디오만 — 정답 전엔 영상이 안 보이게)
  useEffect(()=>{
    let dead=false;
    loadYouTubeAPI().then(YT=>{
      if(dead||!ytBoxRef.current) return;
      const host=document.createElement("div"); ytBoxRef.current.appendChild(host);
      playerRef.current=new YT.Player(host,{ width:"320", height:"180",
        playerVars:{rel:0, modestbranding:1, playsinline:1, controls:0},
        events:{
          onReady:()=>loadSeg(),
          onStateChange:e=>{ const S=window.YT.PlayerState;
            if(e.data===S.PLAYING) setPlaying(true);
            else if(e.data===S.PAUSED||e.data===S.ENDED||e.data===S.CUED) setPlaying(false);
          },
        } });
    });
    return ()=>{ dead=true; try{ playerRef.current && playerRef.current.destroy(); }catch(e){} playerRef.current=null; if(ytBoxRef.current) ytBoxRef.current.innerHTML=""; };
  },[]);

  // 카드가 바뀌면 그 구간을 로드
  useEffect(()=>{ loadSeg(); },[pos,queue]);

  // 재생 중에는 현재시간 폴링 → ts+5초에서 정지
  useEffect(()=>{ if(!playing) return;
    const iv=setInterval(()=>{ const p=playerRef.current; if(!p||!p.getCurrentTime) return;
      let nv; try{ nv=p.getCurrentTime(); }catch(e){ return; }
      if(nv>=segEnd.current){ try{p.pauseVideo();}catch(e){} setPlaying(false); setT(segEnd.current); return; }
      setT(nv); },200);
    return ()=>clearInterval(iv); },[playing,pos]);

  const replay=()=>{ const p=playerRef.current;
    if(p&&cur){ try{ p.seekTo(cur.ts,true); p.playVideo(); }catch(e){} }
    setT(cur.ts); };

  if(total===0) return (
    <div className="app"><div className="rv-top"><span className="close" onClick={onExit}>← 돌아가기</span></div>
      <div className="rv-empty">
        {nextDue
          ? <>오늘 복습할 카드가 없어요 🎉<br/>다음 복습: <b>{fmtUntil(nextDue)}</b></>
          : <>복습할 카드가 없어요.<br/>대본에서 단어·구문을 먼저 저장해 보세요.</>}
      </div></div>
  );
  if(!cur) return (
    <div className="app"><div className="rv-top"><span className="close" onClick={onExit}>← 돌아가기</span></div>
      <div className="rv-done"><div className="big">🎉</div><h3>복습 완료</h3>
        <p>{total}개 카드를 모두 마쳤어요</p>
        <button className="rv-show" onClick={onExit}>돌아가기</button></div></div>
  );
  const rate=g=>{ setRevealed(false);
    if(onGrade && cur) onGrade(cur,g);   // 간격 반복 일정 갱신(영속)
    if(g==="good"){ setDone(d=>d+1); setPos(p=>p+1); }
    else if(g==="soso"){ setQueue(q=>{const nq=[...q];nq.splice(pos+2,0,nq[pos]);return nq;}); setPos(p=>p+1); }
    else{ setQueue(q=>{const nq=[...q];nq.push(nq[pos]);return nq;}); setPos(p=>p+1); }
  };
  return (
    <div className="app">
      <div ref={ytBoxRef} style={{position:"fixed",left:0,bottom:0,width:320,height:180,opacity:0,pointerEvents:"none"}}></div>
      <div className="rv-top">
        <span className="close" onClick={onExit}>← 돌아가기</span>
        <div className="rv-bar"><i style={{width:(done/total*100)+"%"}}></i></div>
        <span className="rv-bar-txt">{done} / {total}</span>
      </div>
      {sourceLabel && <div className="rv-src">복습 중: {sourceLabel}</div>}
      <div className="rv-card">
        {!revealed ? <>
          <div className="rv-hw">{cur.text}</div>
          <span className={"badge rv-badge "+(cur.type==="word"?"b-word":cur.type==="phrase"?"b-phrase":"b-sent")}>{cur.type==="word"?"단어":cur.type==="phrase"?"구문":"문장"}</span>
          <div className="rv-q">뜻을 떠올려 보세요</div>
          <button className="rv-play" onClick={()=>{ if(playing){ try{playerRef.current&&playerRef.current.pauseVideo();}catch(e){} setPlaying(false); } else replay(); }}>{playing?"❚❚ 듣는 중":"🔊 맥락 듣기"}</button>
          <button className="rv-show" onClick={()=>setRevealed(true)}>정답 보기</button>
        </> : <>
          <div className="rv-hw">{cur.text}</div>
          {cur.tag && <span className={"badge rv-badge "+(cur.type==="word"?"b-word":cur.type==="phrase"?"b-phrase":"b-sent")}>#{cur.tag}</span>}
          {cur.ko && <div className="rv-ko">{cur.ko}</div>}
          {cur.en && <div className="rv-en">{cur.en}</div>}
          <div className="rv-ctx">{(()=>{const lo=cur.sentence.toLowerCase(),tl=cur.text.toLowerCase(),i=lo.indexOf(tl);
            return i<0?cur.sentence:<>{cur.sentence.slice(0,i)}<mark>{cur.sentence.slice(i,i+cur.text.length)}</mark>{cur.sentence.slice(i+cur.text.length)}</>;})()}</div>
          <button className="rv-replay" onClick={replay}>↻ 맥락 다시 듣기</button>
          <div className="rv-rate">
            <button className="rv-again" onClick={()=>rate("again")}>다시</button>
            <button className="rv-soso" onClick={()=>rate("soso")}>애매</button>
            <button className="rv-good" onClick={()=>rate("good")}>알아</button>
          </div>
        </>}
      </div>
    </div>
  );
}

function Search({existingIds,onAdd,onImport,onNav,due}){
  const [minM,setMinM]=useState(0);
  const [maxM,setMaxM]=useState(120);
  const [lvl,setLvl]=useState(2);
  const [topics,setTopics]=useState([]);
  const [allTopics,setAllTopics]=useState(()=>{ try{const s=JSON.parse(localStorage.getItem("listen-up.topics")); if(Array.isArray(s)&&s.length)return s;}catch(e){} return ["여행","과학","일상","심리","자연·환경","요리"]; });
  const [adding,setAdding]=useState(false);
  const [newTopic,setNewTopic]=useState("");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState(0);
  const [addingId,setAddingId]=useState(null);
  const [importUrl,setImportUrl]=useState("");
  const [importing,setImporting]=useState(false);
  const [q,setQ]=useState("");                 // 검색창 입력 중인 값
  const [qDone,setQDone]=useState("");         // 제출된 검색어 (Enter/버튼)
  const [sort,setSort]=useState("relevance");  // 정렬: 관련순|최신순|조회순
  const [mode,setMode]=useState("study");      // 검색 범위: 학습 중심|일반·전체
  const [qhist,setQhist]=useState(loadQHist());
  // 주제 목록 영속화(추가·삭제 유지)
  useEffect(()=>{ try{localStorage.setItem("listen-up.topics",JSON.stringify(allTopics));}catch(e){} },[allTopics]);
  // 필터 바뀌면 page 0 으로
  useEffect(()=>{ setPage(0); },[minM,maxM,lvl,topics,qDone,sort,mode]);
  // 검색 (검색어·필터·page 변동 시) — 350ms 디바운스 + 결과 스트리밍(오는 대로 추가)
  // 스트림이 끝나면 제목 기반 난이도 분류(Haiku·캐시) → 배지 갱신 + 선택 난이도 우선 정렬
  useEffect(()=>{
    let alive=true; setLoading(true);
    const t=setTimeout(()=>{ if(!alive) return;
      setResults([]);
      const got=[];
      searchVideos({q:qDone,minSec:minM*60,maxSec:maxM*60,level:lvl,topics,sort,mode,page},
        item=>{ if(alive){ got.push(item); setResults(rs=>[...rs,item]); } })
        .then(async()=>{ if(!alive) return; setLoading(false);
          const lv=await classifyLevels(got.filter(r=>!r.level));
          if(!alive) return;

/* ── 로컬 영속화: 라이브러리(clips)를 localStorage 에 저장·복원 ──
   study-app 방식(단일 파일 + localStorage). 기기 간 백업은 아래 Gist 동기화로 확장됨. */
const STORE_KEY = "listen-up.library.v1";

/* 자막으로 실측 난이도(CEFR) 계산 — 말 속도(WPM) + 문장 복잡도(Flesch-Kincaid 근사).
   LLM 불필요(무료·즉시). 제목 기반 추정보다 정확해 클립 추가 시 레벨을 덮어쓴다. */
function measureLevel(tx){
  if(!Array.isArray(tx)||tx.length<4) return "";
  const text=tx.map(s=>s.text).join(" ");
  const words=text.split(/\s+/).filter(Boolean);
  const n=words.length; if(n<60) return "";
  const dur=(Number(tx[tx.length-1].end)||Number(tx[tx.length-1].start))-Number(tx[0].start);
  const wpm=dur>30 ? n/(dur/60) : 0;
  const punct=(text.match(/[.!?]+/g)||[]).length;
  const sentences=punct>=tx.length*0.5 ? punct : tx.length;   // 부호 없으면 세그먼트≈문장
  const syl=w=>{ w=w.toLowerCase().replace(/[^a-z]/g,""); if(!w) return 0;
    const m=w.match(/[aeiouy]{1,2}/g); let c=m?m.length:1; if(w.endsWith("e")&&c>1)c--; return Math.max(1,c); };
  const fk=0.39*(n/Math.max(1,sentences))+11.8*(words.reduce((s,w)=>s+syl(w),0)/n)-15.59;
  let score=0;
  score += wpm>=170?3 : wpm>=145?2 : wpm>=115?1 : 0;          // 말 속도
  score += fk>=11?3 : fk>=8?2 : fk>=5?1 : 0;                  // 문장·어휘 복잡도
  return ["A2","B1","B1","B2","B2","C1","C1"][score]||"B1";
}
// 기존 클립도 로드 시 1회 실측 (자막이 이미 저장돼 있으므로 무료)
function measureClips(clips){
  for(const c of (clips||[])){
    if(!c.lvlMeasured && Array.isArray(c.transcript) && c.transcript.length>3){
      const lv=measureLevel(c.transcript);
      if(lv){ c.level=lv; c.lvlMeasured=true; }
    }
  }
  return clips;
}

// 과거 버그(uid 카운터 리셋)로 생긴 중복 id 를 로드 시 정리 — 복습 누락 방지.
function dedupeIds(clips){
  const seen=new Set();
  for(const c of (clips||[])){
    for(const v of (c.vocab||[])){ if(v.id==null||seen.has(v.id)) v.id=uid(); seen.add(v.id); }
    for(const m of (c.marks||[])){ if(m.id==null||seen.has(m.id)) m.id=uid(); seen.add(m.id); }
  }
  return clips;
}
function loadClips(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const v = JSON.parse(raw); if(Array.isArray(v) && v.length) return measureClips(dedupeIds(v)); }
  }catch(e){ console.error("library load 실패:", e); }
  return seedClips();            // 저장된 게 없으면 시드(예시) 라이브러리
}
function saveClips(clips){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(clips)); }
  catch(e){ console.error("library save 실패:", e); }
}

/* ── 간격 반복(SRS, Leitner): 어휘에 due(다음 복습 ms)·streak(연속 정답) 저장 ── */
const SRS_LADDER=[0,1,3,7,14,30,60,120];   // streak 단계별 간격(일)
const DAY=86400000;
function applySrs(v, grade){
  const now=Date.now();
  let streak=v.streak||0, due;
  if(grade==="good"){ streak=Math.min(streak+1, SRS_LADDER.length-1); due=now+SRS_LADDER[streak]*DAY; }
  else if(grade==="soso"){ due=now+Math.max(DAY, SRS_LADDER[Math.min(streak,SRS_LADDER.length-1)]*DAY/2); }
  else { streak=0; due=now+10*60000; }   // again: 10분 뒤
  return {...v, streak, due, lastReviewed:now};
}
function fmtUntil(ts){ const d=ts-Date.now(); if(d<=0) return "지금";
  const m=Math.round(d/60000); if(m<60) return m+"분 후";
  const h=Math.round(m/60); if(h<24) return h+"시간 후";
  return Math.round(h/24)+"일 후"; }

/* ── 학습 통계 (일별 듣기시간·어휘·복습·받아쓰기 → 스트릭) ─────────
   localStorage "listen-up.stats" = { days:{ "YYYY-MM-DD":{listen,vocab,review,dict,dictOk} } } */
const STATS_KEY="listen-up.stats";
function ymd(d){ const x=d||new Date();
  return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function loadStats(){ try{ const s=JSON.parse(localStorage.getItem(STATS_KEY)||"{}"); return s.days?s:{days:{}}; }catch(e){ return {days:{}}; } }
function statBump(field,n){ const s=loadStats(); const k=ymd();
  const d=s.days[k]||(s.days[k]={listen:0,vocab:0,review:0,dict:0,dictOk:0});
  d[field]=(d[field]||0)+(n==null?1:n);
  try{ localStorage.setItem(STATS_KEY,JSON.stringify(s)); }catch(e){} }
// 듣기 시간은 0.2s 단위로 쌓이므로 버퍼에 모아 2초마다 저장 (localStorage 잦은 쓰기 방지)
let _listenBuf=0;
function statAddListen(sec){ _listenBuf+=sec; if(_listenBuf>=2){ statBump("listen",Math.round(_listenBuf)); _listenBuf=0; _checkGoal(); } }

/* 오늘 듣기 목표(분): 진행 바 + 달성 순간 1회 축하 이벤트 */
const GOAL_KEY="listen-up.goalMin";
function getGoalMin(){ const n=Number(localStorage.getItem(GOAL_KEY)); return n>=1?n:10; }
function setGoalMin(n){ try{ localStorage.setItem(GOAL_KEY,String(n)); }catch(e){} }
function _checkGoal(){ try{
  const day=ymd(); if(localStorage.getItem("listen-up.goalDoneDay")===day) return;
  if((todayStats().listen||0)>=getGoalMin()*60){
    localStorage.setItem("listen-up.goalDoneDay",day);
    window.dispatchEvent(new CustomEvent("lu-goal-done"));
  } }catch(e){} }

/* 복습 밀린 카드 수 (네비 배지·오늘 카드용) */
function dueCount(clips){ const now=Date.now();
  return (clips||[]).reduce((s,c)=>s+(c.vocab||[]).filter(v=>(v.due||0)<=now).length,0); }

/* 최근 검색어 (최대 8개) */
const QHIST_KEY="listen-up.qhist";
function loadQHist(){ try{ const h=JSON.parse(localStorage.getItem(QHIST_KEY)||"[]"); return Array.isArray(h)?h:[]; }catch(e){ return []; } }
function saveQHist(q){ try{ localStorage.setItem(QHIST_KEY,JSON.stringify([q,...loadQHist().filter(x=>x!==q)].slice(0,8))); }catch(e){} }
function rmQHist(q){ try{ localStorage.setItem(QHIST_KEY,JSON.stringify(loadQHist().filter(x=>x!==q))); }catch(e){} }
function isActiveDay(d){ return !!d && ((d.listen||0)>=60 || (d.vocab||0)>0 || (d.review||0)>0 || (d.dict||0)>0); }
// 연속 학습일: 오늘(또는 어제)부터 뒤로 세며 활동한 날 수
function streakDays(){ const s=loadStats(); let n=0; const t=new Date();
  if(!isActiveDay(s.days[ymd(t)])) t.setDate(t.getDate()-1); // 오늘 아직 안 했으면 어제부터
  for(;;){ if(isActiveDay(s.days[ymd(t)])){ n++; t.setDate(t.getDate()-1); } else break; }
  return n; }
function todayStats(){ return loadStats().days[ymd()]||{listen:0,vocab:0,review:0,dict:0,dictOk:0}; }

/* ── GitHub Gist 동기화 (study-app 방식: localStorage ↔ 비공개 Gist) ──
   토큰 'gist_token'(gist 스코프 PAT) + 'gist_id'. 라이브러리 전체를
   {updatedAt, clips} 한 덩어리로 비공개 Gist 에 PATCH/POST. last-write-wins. */
const GIST_FILE = "listen-up_sync.json";
const TS_KEY    = "listen-up.updatedAt";
let   GIST_TOKEN = localStorage.getItem("gist_token") || "";
let   GIST_ID    = localStorage.getItem("gist_id")    || "";

function gistConnected(){ return !!GIST_TOKEN; }
function gistHeaders(){
  return { "Authorization":"token "+GIST_TOKEN,
           "Accept":"application/vnd.github+json",
           "Content-Type":"application/json" };
}
function setGistToken(t){ GIST_TOKEN=(t||"").trim();
  if(GIST_TOKEN) localStorage.setItem("gist_token",GIST_TOKEN); else localStorage.removeItem("gist_token"); }
function setGistId(id){ GIST_ID=id||"";
  if(GIST_ID) localStorage.setItem("gist_id",GIST_ID); else localStorage.removeItem("gist_id"); }
function localTS(){ return Number(localStorage.getItem(TS_KEY)||0); }

// 토큰으로 기존 sync Gist 를 찾아 GIST_ID 를 채운다.
// (다른 기기에서 만든 Gist 를 자동 인식 → 기기 간 동기화의 핵심. 같은 토큰이면 같은 Gist 를 쓰게 됨.
//  중복 Gist 가 여러 개면 가장 최근에 갱신된 것을 선택해 데이터 손실을 막는다.)
async function gistDiscover(){
  if(!GIST_TOKEN || GIST_ID) return GIST_ID;
  let best=null;
  for(let page=1; page<=5; page++){
    const res=await fetch("https://api.github.com/gists?per_page=100&page="+page,{ headers:gistHeaders() });
    if(!res.ok) break;
    const list=await res.json();
    if(!Array.isArray(list) || !list.length) break;
    for(const g of list){
      if(g.files && g.files[GIST_FILE] && (!best || new Date(g.updated_at) > new Date(best.updated_at))) best=g;
    }
    if(list.length<100) break;
  }
  if(best) setGistId(best.id);
  return GIST_ID;
}

// 라이브러리를 Gist 로 올림(없으면 비공개 Gist 생성). 성공 시 updatedAt 반환.
async function gistPush(clips){
  if(!GIST_TOKEN) throw new Error("토큰이 없습니다");
  const updatedAt = Date.now();
  const file = { content: JSON.stringify({ updatedAt, clips }) };
  if(!GIST_ID) await gistDiscover(); // 다른 기기가 만든 Gist 가 있으면 새로 만들지 말고 그걸 갱신
  if(!GIST_ID){
    const res=await fetch("https://api.github.com/gists",{ method:"POST", headers:gistHeaders(),
      body:JSON.stringify({ description:"Listen-up sync", public:false, files:{ [GIST_FILE]:file } }) });
    if(!res.ok) throw new Error("Gist 생성 실패 ("+res.status+")");
    setGistId((await res.json()).id);
  }else{
    const res=await fetch("https://api.github.com/gists/"+GIST_ID,{ method:"PATCH", headers:gistHeaders(),
      body:JSON.stringify({ files:{ [GIST_FILE]:file } }) });
    if(res.status===404){ setGistId(""); return gistPush(clips); } // 삭제된 gist → 재생성
    if(!res.ok) throw new Error("Gist 저장 실패 ("+res.status+")");
  }
  localStorage.setItem(TS_KEY,String(updatedAt));
  return updatedAt;
}

// Gist 에서 라이브러리 가져오기 → {updatedAt, clips} 또는 null.
async function gistPull(){
  if(!GIST_TOKEN) return null;
  if(!GIST_ID) await gistDiscover(); // 이 기기엔 gist_id 가 없어도 토큰으로 기존 Gist 를 찾음
  if(!GIST_ID) return null;
  const res=await fetch("https://api.github.com/gists/"+GIST_ID,{ headers:gistHeaders() });
  if(res.status===404){ setGistId(""); return null; }
  if(!res.ok) throw new Error("Gist 불러오기 실패 ("+res.status+")");
  const j=await res.json();
  const f=j.files && j.files[GIST_FILE];
  if(!f || !f.content) return null;
  let content=f.content;
  if(f.truncated && f.raw_url){ content=await (await fetch(f.raw_url,{headers:gistHeaders()})).text(); }
  const data=JSON.parse(content);
  return Array.isArray(data.clips) ? { updatedAt:Number(data.updatedAt)||0, clips:data.clips } : null;
}

let _fbPromise=null;
function loadFirebase(){
  if(_fbPromise) return _fbPromise;
  const cfg=getFirebaseConfig();
  if(!cfg) return Promise.reject(new Error("Firebase 설정이 없습니다"));
  _fbPromise=(async()=>{
    const load=src=>new Promise((ok,no)=>{ const s=document.createElement("script");
      s.src=src; s.onload=ok; s.onerror=()=>no(new Error("스크립트 로드 실패: "+src)); document.head.appendChild(s); });
    if(!window.firebase){
      const V="10.14.1";
      await load(`https://www.gstatic.com/firebasejs/${V}/firebase-app-compat.js`);
      await load(`https://www.gstatic.com/firebasejs/${V}/firebase-auth-compat.js`);
      await load(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore-compat.js`);
    }
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    return firebase;
  })();
  _fbPromise.catch(()=>{ _fbPromise=null; }); // 실패 시 다음에 재시도 가능하게
  return _fbPromise;
}
async function googleSignIn(){
  const fb=await loadFirebase();

  catch(e){ // PWA·팝업 차단 환경은 리다이렉트로
    const c=e && e.code;
    if(c==="auth/popup-blocked"||c==="auth/popup-closed-by-user"||c==="auth/cancelled-popup-request"
       ||c==="auth/operation-not-supported-in-this-environment"){
      await fb.auth().signInWithRedirect(prov);
    } else throw e;
  }
}

// undefined 필드 제거(Firestore 가 거부) — JSON 왕복으로 정리
const _clean=o=>JSON.parse(JSON.stringify(o));
async function cloudPush(clips){
  const fb=await loadFirebase(); const u=fb.auth().currentUser; if(!u) return null;
  const db=fb.firestore(); const root=db.collection("users").doc(u.uid);
  const updatedAt=Date.now();
  const cur=await root.collection("clips").get();
  const batch=db.batch();
  const keep=new Set((clips||[]).map(c=>String(c.id)));
  cur.forEach(d=>{ if(!keep.has(d.id)) batch.delete(d.ref); });   // 삭제된 클립 정리
  for(const c of clips||[]) batch.set(root.collection("clips").doc(String(c.id)), _clean(c));
  let topics=null; try{ topics=JSON.parse(localStorage.getItem("listen-up.topics")||"null"); }catch(e){}
  // API 키도 계정에 저장 (Firestore 규칙상 본인만 읽기 가능) — 어느 기기든 로그인만 하면 적용
  batch.set(root, _clean({ updatedAt, stats:loadStats(),
    settings:{ goalMin:getGoalMin(), apiBase:getApiUrl(), topics, qhist:loadQHist(),
      anthKey:getAnthropicKey(), supKey:getSupadataKey() } }));
  await batch.commit();
  localStorage.setItem(TS_KEY,String(updatedAt));
  return updatedAt;
}
async function cloudPull(){
  const fb=await loadFirebase(); const u=fb.auth().currentUser; if(!u) return null;
  const db=fb.firestore(); const root=db.collection("users").doc(u.uid);
  const [doc,snap]=await Promise.all([root.get(), root.collection("clips").get()]);
  if(!doc.exists) return null;
  const d=doc.data()||{};
  const clips=[]; snap.forEach(x=>clips.push(x.data()));
  return { updatedAt:Number(d.updatedAt)||0, clips, stats:d.stats||null, settings:d.settings||null };
}
// 내려받은 통계·설정을 이 기기에 적용. API 키는 계정 값이 있으면 채택(계정이 기준) —
// 로그인한 본인의 키가 어느 기기에서든 따라온다. (Gist 토큰은 기기별 보관 유지)

/* ── 공유 자막 캐시 (Firestore transcripts/{videoId}) ─────────────
   어떤 영상이든 전 세계에서 1번만 추출하면 모두가 재사용 — Supadata 월 한도 절약.
   읽기는 누구나(게스트 포함), 쓰기는 로그인 사용자만 (Firestore 규칙 참고). */
async function cacheGetTranscript(videoId){
  if(!getFirebaseConfig()) return null;
  try{
    const fb=await loadFirebase();
    const doc=await fb.firestore().collection("transcripts").doc(String(videoId)).get();
    if(doc.exists){ const d=doc.data()||{}; if(Array.isArray(d.segs)&&d.segs.length) return d.segs; }
  }catch(e){ /* 규칙 미설정·오프라인 등 — 캐시 없이 진행 */ }
  return null;
}
async function cacheSetTranscript(videoId,segs){
  if(!getFirebaseConfig()||!Array.isArray(segs)||!segs.length) return;
  try{
    const raw=JSON.stringify(segs);
    if(raw.length>900000) return;                      // Firestore 문서 1MB 한도 여유
    const fb=await loadFirebase();
    if(!fb.auth().currentUser) return;                 // 쓰기는 로그인 필요(규칙)
    await fb.firestore().collection("transcripts").doc(String(videoId))
      .set({ segs:JSON.parse(raw), updatedAt:Date.now() });
  }catch(e){ /* 실패해도 학습엔 지장 없음 */ }
}

/* ── 공유 분석 캐시 (Firestore analyze/{type:표현}) ─────────────────
   같은 단어·구문의 뜻·태그는 전 세계에서 1번만 분석 — Anthropic 비용 대폭 절감.
   문장(sentence)은 겹칠 일이 거의 없어 캐시하지 않는다. */
function analyzeCacheId(text,type){
  if(type==="sentence") return null;
  const t=String(text||"").toLowerCase().trim().replace(/\s+/g," ");
  if(!t || t.length>120) return null;
  return type+":"+t.replace(/[\/#?%\[\]]/g,"_"); // Firestore 문서 id 금지문자 치환
}
async function cacheGetAnalyze(text,type){
  const id=analyzeCacheId(text,type); if(!id||!getFirebaseConfig()) return null;
  try{
    const fb=await loadFirebase();
    const doc=await fb.firestore().collection("analyze").doc(id).get();
    if(doc.exists){ const d=doc.data()||{}; if(d.ko||d.en) return {ko:d.ko||"",en:d.en||"",tag:d.tag||""}; }
  }catch(e){}
  return null;
}
async function cacheSetAnalyze(text,type,a){
  if(!a||(!a.ko&&!a.en)) return;
  const id=analyzeCacheId(text,type); if(!id||!getFirebaseConfig()) return;
  try{
    const fb=await loadFirebase();
    if(!fb.auth().currentUser) return; // 쓰기는 로그인 필요(규칙)
    await fb.firestore().collection("analyze").doc(id)
      .set({ko:a.ko||"",en:a.en||"",tag:a.tag||"",updatedAt:Date.now()});
  }catch(e){}
}
